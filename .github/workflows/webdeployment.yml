name: Deployment

on:
  push:
    branches:
      - main

jobs:
  deployment:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # needed so the deploy action can push to gh-pages

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 9
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Publish
        run: |
          cd LambdaCalculus/LambdaCalculusWeb
          dotnet publish -c Release --self-contained true

      # - name: Change base-tag in index.html from / to the necessary
      #   run: sed -i 's/<base href="\/" \/>/<base href="\/LambdaCalculusFSharp\/" \/>/g' \
      #     ./LambdaCalculus/LambdaCalculusWeb/bin/Release/net9.0/publish/wwwroot/index.html

      - name: Add .nojekyll file
        run: |
          touch ./LambdaCalculus/LambdaCalculusWeb/bin/Release/net9.0/publish/wwwroot/.nojekyll

      - name: gh-pages publish
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          branch: gh-pages
          folder: ./LambdaCalculus/LambdaCalculusWeb/bin/Release/net9.0/publish/wwwroot
